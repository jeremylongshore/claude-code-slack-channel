name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Biome lint (Wall 7b — static analysis)
        # Initial adoption with a curated rule set known to already pass on
        # the repo: correctness (noConstAssign, noUnreachable, etc.), security
        # (noGlobalEval), suspicious (noDebugger, noFocusedTests/noSkippedTests
        # — catches .skip/.only regressions alongside the existing grep-based
        # check), and complexity (noExtraBooleanCast, noUselessConstructor).
        # Formatter is disabled to keep this PR a no-op on existing style.
        # Tightening to recommended + specific style rules is tracked in
        # follow-up bds (see 000-docs/QUALITY_GATES.md §7b for the roadmap).
        run: bunx @biomejs/biome check .

      - name: Test
        run: bun test

      - name: Coverage floor (≥95% line + function)
        run: bash scripts/coverage-floor.sh 95

      - name: Architecture rules (dependency-cruiser)
        # Note: dependency-cruiser v17 removed the `--validate` flag; passing
        # `-c/--config` now runs validation automatically. Omitting `--validate`
        # so the step actually fails on violations (with `--validate` v17 silently
        # prints help + exits 0, defeating the point of the CI gate).
        run: bunx depcruise --config .dependency-cruiser.js .

      - name: Gherkin lint (Wall 1)
        # Enforces declarative-style acceptance contracts for the security
        # primitives. See features/README.md. Lint-only today — runner deferred.
        run: bash scripts/gherkin-lint.sh --path features/ --strict

      - name: Harness-hash verify (tamper check)
        # Pins features/*.feature and .dependency-cruiser.js by SHA-256. Any
        # byte edit to a pinned file without re-running --init fails here.
        run: bash scripts/harness-hash.sh --verify

      - name: Dependency vulnerability audit (bun audit)
        # Native bun gate against the GitHub Advisory Database. Only fails on
        # NEW high/critical advisories; known moderates in transitive deps are
        # tracked separately (see bd ccsc-<follow-up>). The ignored advisory
        # is a high-severity path-to-regexp finding inside @modelcontextprotocol/sdk
        # — unfixable from our side until the SDK ships an updated transitive.
        run: bun audit --audit-level=high --ignore=GHSA-j3q9-mxjg-w52f

      - name: Cyclomatic complexity (Wall 5 — regression gate)
        # TS-aware AST walker over production sources. Threshold set to 85 — the
        # baseline ceiling observed on main (server.ts has one 84-complexity
        # anonymous function). Prevents worsening; a follow-up bd tracks
        # refactoring the four functions currently over the Wall 5 ideal (30)
        # and tightening this threshold once that lands.
        run: bun scripts/crap-score.ts --threshold 85
