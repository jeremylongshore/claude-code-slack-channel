name: Secrets scan

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history lets gitleaks walk commits on push events. For PRs
          # the job scopes itself to the PR head (see the conditional run).
          fetch-depth: 0
          persist-credentials: false

      # Install gitleaks from the upstream release archive. We install the
      # binary directly rather than using gitleaks-action because v2+ of
      # the action has licensing requirements for organization repos; the
      # upstream binary is Apache-2.0 without conditions.
      #
      # Version: v8.30.1 (latest stable as of 2026-04). Bump via a PR.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan (pull_request)
        if: github.event_name == 'pull_request'
        # Scan only the commits introduced by the PR. Fast; focuses on what
        # the PR actually adds. A merge will still be scanned end-to-end by
        # the push-to-main job below.
        run: |
          gitleaks git \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact --verbose --exit-code 1

      - name: Scan (push to main)
        if: github.event_name == 'push'
        # Full-history scan on pushes to main. Catches anything that slipped
        # in via the admin-merge path.
        run: gitleaks git --redact --verbose --exit-code 1
